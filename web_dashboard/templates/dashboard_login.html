<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Albion Analytics — Dashboard</title>
  <link rel="preload" href="{{ url_for('serve_video_gif', name='secret.gif') }}" as="image" />
  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}" />
</head>
<body class="ds-body">
  <div class="ds-login-wrap">
    <div class="ds-panel ds-login-panel">
      <div class="ds-login-gif-wrap ds-media-gif-slot">
        <div class="ds-gif-placeholder" id="ds-login-gif-ph" aria-hidden="true">
          <span class="ds-gif-placeholder-ring"></span>
          <span class="ds-gif-placeholder-label">Loading…</span>
        </div>
        <img
          id="ds-login-secret-gif"
          class="ds-login-secret-gif ds-media-gif"
          src="{{ url_for('serve_video_gif', name='secret.gif') }}"
          alt=""
          decoding="async"
          fetchpriority="high"
        />
      </div>
      <h1 class="ds-brand">ALBION <span class="ds-accent">ANALYTICS</span></h1>
      <p class="ds-muted">Private dashboard — enter access token from <code>DASHBOARD_SECRET</code>.</p>
      {% if error %}
      <div class="ds-alert">{{ error }}</div>
      {% endif %}
      <form method="post" class="ds-form">
        <label class="ds-label" for="token">Access token</label>
        <input class="ds-input" type="password" id="token" name="token" autocomplete="off" required />
        <button class="ds-btn ds-btn-primary" type="submit">Enter</button>
      </form>
    </div>
  </div>
  <script>
    (function () {
      var img = document.getElementById("ds-login-secret-gif");
      var ph = document.getElementById("ds-login-gif-ph");
      if (!img || !ph) return;
      var done = false;
      function reveal() {
        if (done) return;
        done = true;
        ph.classList.add("is-hidden");
        img.classList.add("is-visible");
      }
      img.addEventListener("load", reveal);
      img.addEventListener("error", reveal);
      requestAnimationFrame(function () {
        if (img.complete && img.naturalWidth > 0) reveal();
      });
      setTimeout(reveal, 12000);
    })();
  </script>
</body>
</html>
